    <script>
      // 별도 이미지 파일 없이, 앱 브랜드 컬러(파란색)를 배경으로 한 캘린더 아이콘을
      // 캔버스로 즉석에서 그려 홈 화면 추가 아이콘(apple-touch-icon 등)으로 등록합니다.
      (function setupHomeScreenIcon() {
        try {
          const size = 180;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');

          const grad = ctx.createLinearGradient(0, 0, size, size);
          grad.addColorStop(0, '#3b82f6');
          grad.addColorStop(1, '#1d4ed8');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, size, size);

          ctx.font = `${Math.round(size * 0.6)}px -apple-system, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('📅', size / 2, size / 2 + size * 0.05);

          const dataUrl = canvas.toDataURL('image/png');

          [
            { rel: 'apple-touch-icon' },
            { rel: 'icon', type: 'image/png' },
            { rel: 'shortcut icon', type: 'image/png' }
          ].forEach(cfg => {
            const link = document.createElement('link');
            link.rel = cfg.rel;
            if (cfg.type) link.type = cfg.type;
            link.href = dataUrl;
            document.head.appendChild(link);
          });
        } catch (e) {
          console.error('홈 화면 아이콘 생성 실패:', e);
        }
      })();
    </script>
